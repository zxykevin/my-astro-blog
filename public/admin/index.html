<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="robots" content="noindex, nofollow" />
		<title>Yuulog Admin - 评论审核</title>
		<style>
			:root {
				color-scheme: dark;
				--bg: #08111f;
				--panel: rgb(15 23 42 / 0.78);
				--panel-strong: rgb(15 23 42 / 0.94);
				--line: rgb(148 163 184 / 0.18);
				--text: #e5eefc;
				--muted: #9fb0ca;
				--accent: #60a5fa;
				--success: #22c55e;
				--warning: #eab308;
				--danger: #ef4444;
				--neutral: #64748b;
				font-family:
					Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
					"Segoe UI", sans-serif;
			}

			* {
				box-sizing: border-box;
			}

			body {
				min-height: 100vh;
				margin: 0;
				background:
					radial-gradient(circle at top left, rgb(37 99 235 / 0.18), transparent 28rem),
					radial-gradient(circle at top right, rgb(16 185 129 / 0.12), transparent 24rem),
					var(--bg);
				color: var(--text);
			}

			button,
			input {
				font: inherit;
			}

			button {
				cursor: pointer;
			}

			.shell {
				width: min(1200px, calc(100% - 32px));
				margin: 0 auto;
				padding: 32px 0 48px;
			}

			.hero,
			.toolbar,
			.comment-card,
			.state-card {
				border: 1px solid var(--line);
				background: var(--panel);
				box-shadow: 0 20px 60px rgb(0 0 0 / 0.22);
				backdrop-filter: blur(18px);
			}

			.hero {
				display: flex;
				align-items: flex-start;
				justify-content: space-between;
				gap: 20px;
				border-radius: 18px;
				padding: 24px;
			}

			.eyebrow {
				margin: 0 0 6px;
				color: var(--accent);
				font-size: 12px;
				font-weight: 700;
				letter-spacing: 0;
				text-transform: uppercase;
			}

			h1 {
				margin: 0;
				font-size: clamp(24px, 4vw, 34px);
				letter-spacing: 0;
			}

			.hero-copy {
				margin: 8px 0 0;
				color: var(--muted);
			}

			.status-stack {
				display: grid;
				gap: 10px;
				min-width: 180px;
			}

			.pill {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
				border-radius: 999px;
				background: rgb(15 23 42 / 0.78);
				padding: 9px 12px;
				color: var(--muted);
				font-size: 13px;
			}

			.pill strong {
				color: var(--text);
				font-weight: 700;
			}

			.toolbar {
				display: grid;
				gap: 16px;
				margin-top: 18px;
				border-radius: 18px;
				padding: 18px;
			}

			.toolbar-row {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
			}

			.field {
				display: grid;
				gap: 6px;
				flex: 1 1 280px;
			}

			.field span {
				color: var(--muted);
				font-size: 13px;
			}

			input {
				width: 100%;
				border: 1px solid var(--line);
				border-radius: 12px;
				background: rgb(2 6 23 / 0.62);
				padding: 12px 14px;
				color: var(--text);
				outline: none;
			}

			input:focus {
				border-color: rgb(96 165 250 / 0.65);
				box-shadow: 0 0 0 3px rgb(96 165 250 / 0.14);
			}

			.actions,
			.filters {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				align-items: end;
			}

			.btn,
			.filter-btn {
				min-height: 44px;
				border: 1px solid transparent;
				border-radius: 12px;
				padding: 10px 14px;
				color: var(--text);
				background: rgb(30 41 59 / 0.94);
				transition:
					transform 0.15s ease,
					background-color 0.15s ease,
					border-color 0.15s ease,
					opacity 0.15s ease;
			}

			.btn:hover,
			.filter-btn:hover {
				transform: translateY(-1px);
			}

			.btn-primary {
				background: #2563eb;
			}

			.btn-danger {
				background: rgb(127 29 29 / 0.92);
			}

			.btn:disabled,
			.card-actions button:disabled {
				cursor: not-allowed;
				opacity: 0.55;
				transform: none;
			}

			.filter-btn {
				color: var(--muted);
				border-color: var(--line);
			}

			.filter-btn.active {
				border-color: rgb(96 165 250 / 0.52);
				background: rgb(37 99 235 / 0.2);
				color: var(--text);
			}

			.count {
				margin-left: 6px;
				color: var(--accent);
			}

			.feedback {
				min-height: 22px;
				color: var(--muted);
				font-size: 14px;
			}

			.feedback.error {
				color: #fca5a5;
			}

			.feedback.success {
				color: #86efac;
			}

			.content {
				margin-top: 18px;
			}

			.comment-grid {
				display: grid;
				gap: 14px;
			}

			.comment-card,
			.state-card {
				border-radius: 18px;
				padding: 18px;
			}

			.comment-card.reply {
				border-left: 4px solid var(--accent);
			}

			.card-head,
			.card-foot {
				display: flex;
				align-items: flex-start;
				justify-content: space-between;
				gap: 16px;
			}

			.card-head h2 {
				margin: 0;
				font-size: 18px;
				letter-spacing: 0;
			}

			.meta-line,
			.reply-line {
				margin: 5px 0 0;
				color: var(--muted);
				font-size: 13px;
				overflow-wrap: anywhere;
			}

			.status {
				border-radius: 999px;
				padding: 6px 10px;
				font-size: 12px;
				font-weight: 700;
				text-transform: uppercase;
			}

			.status-approved {
				background: rgb(34 197 94 / 0.16);
				color: #86efac;
			}

			.status-pending {
				background: rgb(234 179 8 / 0.16);
				color: #fde68a;
			}

			.status-spam {
				background: rgb(239 68 68 / 0.16);
				color: #fca5a5;
			}

			.status-deleted {
				background: rgb(100 116 139 / 0.18);
				color: #cbd5e1;
			}

			.details {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 12px;
				margin-top: 16px;
			}

			.details div {
				min-width: 0;
			}

			.details span {
				display: block;
				margin-bottom: 4px;
				color: var(--muted);
				font-size: 12px;
			}

			.details strong {
				display: block;
				font-size: 14px;
				font-weight: 600;
				overflow-wrap: anywhere;
			}

			.comment-body {
				margin: 16px 0;
				border-radius: 14px;
				background: rgb(2 6 23 / 0.54);
				padding: 14px;
				line-height: 1.7;
				white-space: pre-wrap;
				overflow-wrap: anywhere;
			}

			.card-actions {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				justify-content: flex-end;
			}

			.card-actions button {
				min-height: 40px;
				border: 0;
				border-radius: 10px;
				padding: 9px 12px;
				color: white;
			}

			.approved {
				background: #15803d;
			}

			.pending {
				background: #a16207;
			}

			.spam {
				background: #b91c1c;
			}

			.deleted {
				background: #475569;
			}

			.delete-action {
				background: #7f1d1d;
			}

			.state-card {
				color: var(--muted);
			}

			.skeleton {
				min-height: 180px;
				background:
					linear-gradient(90deg, transparent, rgb(255 255 255 / 0.08), transparent),
					var(--panel);
				background-size: 220% 100%;
				animation: shimmer 1.4s infinite linear;
			}

			@keyframes shimmer {
				from {
					background-position: 220% 0;
				}
				to {
					background-position: -220% 0;
				}
			}

			@media (max-width: 760px) {
				.shell {
					width: min(100% - 24px, 1200px);
					padding-top: 18px;
				}

				.hero,
				.card-head,
				.card-foot {
					flex-direction: column;
				}

				.status-stack {
					width: 100%;
				}

				.actions,
				.filters {
					width: 100%;
				}

				.actions .btn,
				.filters .filter-btn {
					flex: 1 1 calc(50% - 8px);
				}

				.details {
					grid-template-columns: 1fr;
				}

				.card-actions {
					justify-content: stretch;
				}

				.card-actions button {
					flex: 1 1 calc(50% - 8px);
				}
			}
		</style>
	</head>
	<body>
		<main class="shell">
			<section class="hero" aria-label="后台概览">
				<div>
					<p class="eyebrow">Yuulog Admin</p>
					<h1>评论审核</h1>
					<p class="hero-copy">独立后台页面</p>
				</div>
				<div class="status-stack">
					<div class="pill"><span>Token</span><strong id="token-status">未保存</strong></div>
					<div class="pill"><span>API</span><strong id="api-status">待连接</strong></div>
				</div>
			</section>

			<section class="toolbar" aria-label="审核工具栏">
				<div class="toolbar-row">
					<label class="field">
						<span>ADMIN_TOKEN</span>
						<input id="token-input" type="password" autocomplete="off" placeholder="输入 ADMIN_TOKEN" />
					</label>
					<div class="actions">
						<button class="btn btn-primary" id="save-token" type="button">保存 token</button>
						<button class="btn btn-danger" id="clear-token" type="button">清除 token</button>
						<button class="btn" id="refresh" type="button">刷新</button>
					</div>
				</div>

				<div class="toolbar-row">
					<label class="field">
						<span>搜索</span>
						<input id="search-input" type="search" placeholder="作者、评论内容或页面路径" />
					</label>
				</div>

				<div class="filters" id="filters" aria-label="状态筛选"></div>
				<div class="feedback" id="feedback" aria-live="polite"></div>
			</section>

			<section class="content" aria-live="polite">
				<div class="comment-grid" id="comment-list"></div>
			</section>
		</main>

		<script>
			const API_BASE_URL = "https://comments.yuulog.org";
			const STORAGE_KEY = "mizuki-admin-comments-token";
			const MUTABLE_STATUSES = ["approved", "pending", "spam"];
			const FILTERS = [
				{ value: "", label: "全部" },
				{ value: "pending", label: "pending" },
				{ value: "approved", label: "approved" },
				{ value: "spam", label: "spam" },
				{ value: "deleted", label: "deleted" },
			];

			const state = {
				token: localStorage.getItem(STORAGE_KEY) || "",
				comments: [],
				filter: "",
				query: "",
				loading: false,
				busyId: "",
			};

			const els = {
				tokenInput: document.getElementById("token-input"),
				tokenStatus: document.getElementById("token-status"),
				apiStatus: document.getElementById("api-status"),
				saveToken: document.getElementById("save-token"),
				clearToken: document.getElementById("clear-token"),
				refresh: document.getElementById("refresh"),
				searchInput: document.getElementById("search-input"),
				filters: document.getElementById("filters"),
				feedback: document.getElementById("feedback"),
				commentList: document.getElementById("comment-list"),
			};

			function endpoint(path) {
				return `${API_BASE_URL}${path}`;
			}

			function escapeHtml(value) {
				return String(value ?? "")
					.replaceAll("&", "&amp;")
					.replaceAll("<", "&lt;")
					.replaceAll(">", "&gt;")
					.replaceAll('"', "&quot;")
					.replaceAll("'", "&#039;");
			}

			function formatDate(value) {
				const date = new Date(value);
				return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
			}

			function setFeedback(message = "", tone = "") {
				els.feedback.textContent = message;
				els.feedback.className = `feedback ${tone}`.trim();
			}

			function setTokenStatus() {
				els.tokenStatus.textContent = state.token ? "已保存" : "未保存";
				els.tokenInput.value = state.token;
			}

			function counts() {
				return state.comments.reduce(
					(acc, comment) => {
						acc.all += 1;
						acc[comment.status] += 1;
						return acc;
					},
					{ all: 0, pending: 0, approved: 0, spam: 0, deleted: 0 },
				);
			}

			function visibleComments() {
				const query = state.query.trim().toLowerCase();
				return state.comments.filter((comment) => {
					const matchesStatus = !state.filter || comment.status === state.filter;
					const matchesQuery =
						!query ||
						[comment.nickname, comment.content, comment.pagePath]
							.join("\n")
							.toLowerCase()
							.includes(query);
					return matchesStatus && matchesQuery;
				});
			}

			function renderFilters() {
				const totals = counts();
				els.filters.innerHTML = FILTERS.map(({ value, label }) => {
					const active = value === state.filter ? " active" : "";
					const key = value || "all";
					return `<button class="filter-btn${active}" type="button" data-filter="${value}">${label}<span class="count">${totals[key]}</span></button>`;
				}).join("");
			}

			function renderSkeleton() {
				els.commentList.innerHTML = Array.from({ length: 3 }, () => '<div class="state-card skeleton"></div>').join("");
			}

			function renderState(message) {
				els.commentList.innerHTML = `<div class="state-card">${escapeHtml(message)}</div>`;
			}

			function renderComments() {
				renderFilters();
				if (state.loading) {
					renderSkeleton();
					return;
				}
				if (!state.token) {
					renderState("请先输入 ADMIN_TOKEN");
					return;
				}

				const comments = visibleComments();
				if (!comments.length) {
					renderState("暂无匹配评论");
					return;
				}

				const commentMap = new Map(state.comments.map((comment) => [comment.id, comment]));
				els.commentList.innerHTML = comments
					.map((comment) => {
						const parent = comment.parentId ? commentMap.get(comment.parentId) : null;
						const replyText = comment.parentId ? `回复 @${parent ? parent.nickname : "未知用户"}` : "顶级评论";
						const contact = comment.email || comment.emailHash || "未提供";
						const website = comment.website || "未提供";
						const busy = state.busyId === comment.id;
						const actions = MUTABLE_STATUSES.map((status) => {
							const labels = {
								approved: "通过",
								pending: "待审核",
								spam: "垃圾",
							};
							const disabled = comment.status === status || busy ? " disabled" : "";
							return `<button class="${status}" type="button" data-id="${escapeHtml(comment.id)}" data-status="${status}"${disabled}>${busy && comment.status !== status ? "处理中..." : labels[status]}</button>`;
						}).join("");
						const deleteAction = `<button class="delete-action" type="button" data-id="${escapeHtml(comment.id)}" data-action="delete"${busy ? " disabled" : ""}>${busy ? "处理中..." : "永久删除"}</button>`;

						return `
							<article class="comment-card${comment.parentId ? " reply" : ""}">
								<header class="card-head">
									<div>
										<h2>${escapeHtml(comment.nickname)}</h2>
										<p class="reply-line">${escapeHtml(replyText)}</p>
									</div>
									<span class="status status-${escapeHtml(comment.status)}">${escapeHtml(comment.status)}</span>
								</header>
								<div class="details">
									<div><span>邮箱</span><strong>${escapeHtml(contact)}</strong></div>
									<div><span>网站</span><strong>${escapeHtml(website)}</strong></div>
									<div><span>页面路径</span><strong>${escapeHtml(comment.pagePath)}</strong></div>
									<div><span>创建时间</span><strong>${escapeHtml(formatDate(comment.createdAt))}</strong></div>
									<div><span>parentId</span><strong>${escapeHtml(comment.parentId || "无")}</strong></div>
									<div><span>当前状态</span><strong>${escapeHtml(comment.status)}</strong></div>
								</div>
								<p class="comment-body">${escapeHtml(comment.content)}</p>
								<footer class="card-foot">
									<p class="meta-line">${escapeHtml(replyText)}</p>
									<div class="card-actions">${actions}${deleteAction}</div>
								</footer>
							</article>
						`;
					})
					.join("");
			}

			async function loadComments() {
				if (!state.token) {
					els.apiStatus.textContent = "待连接";
					setFeedback("");
					renderComments();
					return;
				}

				state.loading = true;
				els.apiStatus.textContent = "连接中";
				setFeedback("正在加载评论...");
				renderComments();

				try {
					const response = await fetch(endpoint("/api/admin/comments"), {
						headers: {
							Accept: "application/json",
							Authorization: `Bearer ${state.token}`,
						},
					});
					const data = await response.json();
					if (!response.ok || !data.ok || !Array.isArray(data.comments)) {
						throw new Error(data.message || "评论加载失败");
					}
					state.comments = data.comments;
					els.apiStatus.textContent = "已连接";
					setFeedback(`已加载 ${data.comments.length} 条评论`, "success");
				} catch (error) {
					state.comments = [];
					els.apiStatus.textContent = "异常";
					setFeedback(error instanceof Error ? error.message : "评论加载失败", "error");
				} finally {
					state.loading = false;
					renderComments();
				}
			}

			async function updateStatus(id, status) {
				if (!state.token || state.busyId || !MUTABLE_STATUSES.includes(status)) {
					return;
				}

				const index = state.comments.findIndex((comment) => comment.id === id);
				if (index === -1) {
					return;
				}

				const previousStatus = state.comments[index].status;
				state.busyId = id;
				state.comments[index] = { ...state.comments[index], status };
				setFeedback("正在更新状态...");
				renderComments();

				try {
					const response = await fetch(endpoint(`/api/admin/comments/${encodeURIComponent(id)}/status`), {
						method: "PATCH",
						headers: {
							"Content-Type": "application/json",
							Accept: "application/json",
							Authorization: `Bearer ${state.token}`,
						},
						body: JSON.stringify({ status }),
					});
					const data = await response.json();
					if (!response.ok || !data.ok) {
						throw new Error(data.message || "状态更新失败");
					}
					setFeedback("状态已更新", "success");
				} catch (error) {
					state.comments[index] = { ...state.comments[index], status: previousStatus };
					setFeedback(error instanceof Error ? error.message : "状态更新失败", "error");
				} finally {
					state.busyId = "";
					renderComments();
				}
			}

			async function deleteComment(id) {
				if (!state.token || state.busyId) {
					return;
				}

				if (!window.confirm("确定要永久删除这条评论吗？此操作不可恢复。")) {
					return;
				}

				const index = state.comments.findIndex((comment) => comment.id === id);
				if (index === -1) {
					return;
				}

				state.busyId = id;
				setFeedback("正在永久删除评论...");
				renderComments();

				try {
					const response = await fetch(endpoint(`/api/admin/comments/${encodeURIComponent(id)}`), {
						method: "DELETE",
						headers: {
							Accept: "application/json",
							Authorization: `Bearer ${state.token}`,
						},
					});
					const data = await response.json();
					if (!response.ok || !data.ok) {
						throw new Error(data.message || "评论删除失败");
					}
					state.comments = state.comments.filter((comment) => comment.id !== id);
					setFeedback("评论已永久删除", "success");
				} catch (error) {
					setFeedback(error instanceof Error ? error.message : "评论删除失败", "error");
				} finally {
					state.busyId = "";
					renderComments();
				}
			}

			els.saveToken.addEventListener("click", () => {
				state.token = els.tokenInput.value.trim();
				if (state.token) {
					localStorage.setItem(STORAGE_KEY, state.token);
					setFeedback("Token 已保存", "success");
				} else {
					localStorage.removeItem(STORAGE_KEY);
					setFeedback("Token 为空，未保存", "error");
				}
				setTokenStatus();
				loadComments();
			});

			els.clearToken.addEventListener("click", () => {
				state.token = "";
				state.comments = [];
				localStorage.removeItem(STORAGE_KEY);
				setTokenStatus();
				els.apiStatus.textContent = "待连接";
				setFeedback("Token 已清除", "success");
				renderComments();
			});

			els.refresh.addEventListener("click", loadComments);

			els.searchInput.addEventListener("input", (event) => {
				state.query = event.target.value;
				renderComments();
			});

			els.filters.addEventListener("click", (event) => {
				const button = event.target.closest("[data-filter]");
				if (!button) return;
				state.filter = button.dataset.filter;
				renderComments();
			});

			els.commentList.addEventListener("click", (event) => {
				const button = event.target.closest("[data-id]");
				if (!button) return;
				if (button.dataset.action === "delete") {
					deleteComment(button.dataset.id);
					return;
				}
				if (button.dataset.status) {
					updateStatus(button.dataset.id, button.dataset.status);
				}
			});

			setTokenStatus();
			renderComments();
			loadComments();
		</script>
	</body>
</html>
